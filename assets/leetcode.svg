<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 380" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=Fira+Code:wght@400;500&amp;display=swap');
      
      .status-card {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      
      .mono-text {
        font-family: 'Fira Code', monospace;
      }

      /* Glow Effects */
      .glow-neon-cyan {
        filter: drop-shadow(0 0 4px #00f2fe) drop-shadow(0 0 8px rgba(0, 242, 254, 0.3));
      }
      .glow-neon-emerald {
        filter: drop-shadow(0 0 4px #10b981) drop-shadow(0 0 8px rgba(16, 185, 129, 0.3));
      }
      .glow-neon-amber {
        filter: drop-shadow(0 0 4px #f59e0b) drop-shadow(0 0 8px rgba(245, 158, 11, 0.3));
      }
      .glow-neon-rose {
        filter: drop-shadow(0 0 4px #f43f5e) drop-shadow(0 0 8px rgba(244, 63, 94, 0.3));
      }
      .glow-gold {
        filter: drop-shadow(0 0 4px #fbbf24) drop-shadow(0 0 8px rgba(251, 191, 36, 0.3));
      }

      /* Dial Segment Load Animations */
      @keyframes load-easy-arc {
        from { stroke-dasharray: 0 200; }
        to { stroke-dasharray: 30 200; }
      }
      @keyframes load-medium-arc {
        from { stroke-dasharray: 0 200; }
        to { stroke-dasharray: 30 200; }
      }
      @keyframes load-hard-arc {
        from { stroke-dasharray: 0 200; }
        to { stroke-dasharray: 7 200; }
      }

      /* Scanner effect */
      @keyframes scan-animation {
        0% { transform: translateY(0); opacity: 0; }
        10% { opacity: 0.7; }
        90% { opacity: 0.7; }
        100% { transform: translateY(374px); opacity: 0; }
      }

      /* Pulsing animations */
      @keyframes pulse-light {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      @keyframes pulse-dial {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }

      /* Classes */
      .bar-easy { animation: load-easy-arc 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      .bar-medium { animation: load-medium-arc 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      .bar-hard { animation: load-hard-arc 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      
      .scanner-line { animation: scan-animation 6s linear infinite 1s; }
      .pulse-item { animation: pulse-light 2s ease-in-out infinite; }
      .pulse-core { animation: pulse-dial 2.5s ease-in-out infinite; transform-origin: 80px 277px; }
    </style>

    <!-- Gradients -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0d16" />
      <stop offset="100%" stop-color="#111625" />
    </linearGradient>

    <linearGradient id="dial-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="bar-gradient-easy" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="bar-gradient-medium" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="bar-gradient-hard" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="gold-text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Scanner Glow Filter -->
    <filter id="scan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Body -->
  <rect width="460" height="380" rx="12" fill="url(#card-bg)" stroke="#1f2937" stroke-width="1.5" />
  
  <!-- Outer glowing border line -->
  <rect x="5" y="5" width="450" height="370" rx="9" fill="none" stroke="#2563eb" stroke-width="1.2" opacity="0.3" />

  <!-- Scanning HUD Line -->
  <line x1="6" y1="6" x2="454" y2="6" stroke="#00f2fe" stroke-width="2" class="scanner-line" filter="url(#scan-glow)" />

  <!-- Content Group -->
  <g class="status-card">
    
    <!-- Top Bar / Window Header -->
    <g transform="translate(20, 25)">
      <!-- System Title -->
      <text x="0" y="15" font-size="18" font-weight="800" fill="#f1f5f9" letter-spacing="2">QUEST: CODE TRIAL</text>
      <!-- Subtitle -->
      <text x="0" y="32" font-size="10" font-weight="600" fill="#00f2fe" class="mono-text" letter-spacing="1">THE SYSTEM: LEETCODE CRITICAL PROGRESS</text>
      
      <!-- Tech bracket corner -->
      <path d="M 400 0 L 420 0 L 420 20" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8" />
    </g>

    <!-- Divider Line -->
    <line x1="20" y1="75" x2="440" y2="75" stroke="#1f2937" stroke-width="1" />

    <!-- Left Section: LeetCode Brand Crest -->
    <g transform="translate(20, 90)">
      <!-- Cyber Box for Emblem -->
      <rect width="110" height="110" rx="8" fill="#0b0f19" stroke="#1e293b" stroke-width="1.5" />
      <rect x="4" y="4" width="102" height="102" rx="6" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.2" />

      <!-- Glowing LeetCode Logo -->
      <g transform="translate(24, 20) scale(0.65)" class="glow-neon-cyan">
        <path d="M67.506,83.066 C70.000,80.576 74.037,80.582 76.522,83.080 C79.008,85.578 79.002,89.622 76.508,92.112 L65.435,103.169 C55.219,113.370 38.560,113.518 28.172,103.513 C28.112,103.455 23.486,98.920 8.227,83.957 C-1.924,74.002 -2.936,58.074 6.616,47.846 L24.428,28.774 C33.910,18.621 51.387,17.512 62.227,26.278 L78.405,39.362 C81.144,41.577 81.572,45.598 79.361,48.342 C77.149,51.087 73.135,51.515 70.395,49.300 L54.218,36.217 C48.549,31.632 38.631,32.262 33.739,37.500 L15.927,56.572 C11.277,61.552 11.786,69.574 17.146,74.829 C28.351,85.816 36.987,94.284 36.997,94.294 C42.398,99.495 51.130,99.418 56.433,94.123 L67.506,83.066 Z" fill="#ffa116" />
        <path d="M49.412,2.023 C51.817,-0.552 55.852,-0.686 58.423,1.722 C60.994,4.132 61.128,8.173 58.723,10.749 L15.928,56.572 C11.277,61.551 11.786,69.573 17.145,74.829 L36.909,94.209 C39.425,96.676 39.468,100.719 37.005,103.240 C34.542,105.760 30.506,105.804 27.990,103.336 L8.226,83.956 C-1.924,74.002 -2.936,58.074 6.617,47.846 L49.412,2.023 Z" fill="#f3f4f6" />
        <path d="M40.606,72.001 C37.086,72.001 34.231,69.142 34.231,65.614 C34.231,62.087 37.086,59.228 40.606,59.228 L87.624,59.228 C91.145,59.228 94,62.087 94,65.614 C94,69.142 91.145,72.001 87.624,72.001 L40.606,72.001 Z" fill="#b3b3b3" />
      </g>
      
      <!-- Logo Label below -->
      <text x="55" y="94" font-size="9" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1">LEETCODE</text>
    </g>

    <!-- Right Section: General Stats & Info -->
    <g transform="translate(150, 90)">
      <!-- Username -->
      <text x="0" y="18" font-size="14" font-weight="500" fill="#64748b">HANDLE:</text>
      <text x="75" y="18" font-size="14" font-weight="700" fill="#f8fafc" class="mono-text">anshulsharma_</text>

      <!-- Global Rank -->
      <text x="0" y="40" font-size="14" font-weight="500" fill="#64748b">RANK:</text>
      <text x="75" y="40" font-size="14" font-weight="700" fill="#f1f5f9" class="mono-text">#1,965,340</text>

      <!-- Combat Class based on stats -->
      <text x="0" y="62" font-size="14" font-weight="500" fill="#64748b">SOLVER:</text>
      <text x="75" y="64" font-size="15" font-weight="800" fill="#00f2fe" class="glow-neon-cyan" letter-spacing="1">C-RANK COMPETITOR</text>

      <!-- Skill Guild/Affiliation -->
      <text x="0" y="84" font-size="14" font-weight="500" fill="#64748b">FOCUS:</text>
      <text x="75" y="84" font-size="14" font-weight="600" fill="#3b82f6">Algorithms &amp; Logic</text>

      <!-- Quest Status -->
      <text x="0" y="106" font-size="14" font-weight="500" fill="#64748b">MISSION:</text>
      <text x="75" y="106" font-size="12" font-weight="700" fill="#fb923c" class="mono-text">[ SECURING CORE ]</text>
    </g>

    <!-- Divider Line -->
    <line x1="20" y1="215" x2="440" y2="215" stroke="#1f2937" stroke-width="1" />

    <!-- Bottom Section: Circular Gauge Wheel & Stacked Progress Cards -->
    <g transform="translate(20, 222)">
      
      <!-- Left Sub-Section: Solved Gauge Wheel -->
      <g transform="translate(10, 0)">
        <!-- Background track arc (circumference ~ 239px, 270 degree arc = 179px, gap = 60px) -->
        <path d="M 33.2 81.8 A 38 38 0 1 1 86.8 81.8" fill="none" stroke="#1c2538" stroke-width="5.5" stroke-linecap="round" />
        
        <!-- Easy Arc segment (length 30px, offset 0px) -->
        <path d="M 33.2 81.8 A 38 38 0 1 1 86.8 81.8" fill="none" stroke="url(#bar-gradient-easy)" stroke-width="6" stroke-linecap="round" stroke-dasharray="30 200" stroke-dashoffset="0" class="bar-easy glow-neon-emerald" />
        
        <!-- Medium Arc segment (length 30px, offset -30px) -->
        <path d="M 33.2 81.8 A 38 38 0 1 1 86.8 81.8" fill="none" stroke="url(#bar-gradient-medium)" stroke-width="6" stroke-linecap="round" stroke-dasharray="30 200" stroke-dashoffset="-30" class="bar-medium glow-neon-amber" />
        
        <!-- Hard Arc segment (length 7px, offset -60px) -->
        <path d="M 33.2 81.8 A 38 38 0 1 1 86.8 81.8" fill="none" stroke="url(#bar-gradient-hard)" stroke-width="6" stroke-linecap="round" stroke-dasharray="7 200" stroke-dashoffset="-60" class="bar-hard glow-neon-rose" />
        
        <!-- Solved gauge text elements inside -->
        <g class="pulse-core">
          <text x="60" y="49" text-anchor="middle">
            <tspan font-size="20" font-weight="800" fill="#f1f5f9">76</tspan>
            <tspan font-size="11" font-weight="500" fill="#475569">/3299</tspan>
          </text>
          <text x="60" y="63" font-size="9" font-weight="500" fill="#64748b" text-anchor="middle">Solved</text>
          <text x="60" y="79" font-size="8" font-weight="700" fill="#10b981" text-anchor="middle" class="mono-text">3 Attempting</text>
        </g>
      </g>

      <!-- Right Sub-Section: Difficulty Stacked Cards (Easy, Medium, Hard) -->
      <g transform="translate(140, 5)">
        <!-- Easy Card -->
        <g transform="translate(0, 0)">
          <rect x="0" y="0" width="280" height="32" rx="6" fill="#0b0f19" stroke="#1e293b" stroke-width="1" />
          <rect x="0" y="0" width="4" height="32" rx="2" fill="#10b981" />
          <text x="15" y="20" font-size="12" font-weight="700" fill="#10b981" class="glow-neon-emerald">Easy</text>
          <text x="265" y="20" font-size="12" font-weight="700" fill="#f1f5f9" class="mono-text" text-anchor="end">36 <tspan fill="#475569" font-size="10">/ 830</tspan></text>
        </g>

        <!-- Medium Card -->
        <g transform="translate(0, 39)">
          <rect x="0" y="0" width="280" height="32" rx="6" fill="#0b0f19" stroke="#1e293b" stroke-width="1" />
          <rect x="0" y="0" width="4" height="32" rx="2" fill="#fbbf24" />
          <text x="15" y="20" font-size="12" font-weight="700" fill="#fbbf24" class="glow-neon-amber">Medium</text>
          <text x="265" y="20" font-size="12" font-weight="700" fill="#f1f5f9" class="mono-text" text-anchor="end">37 <tspan fill="#475569" font-size="10">/ 1723</tspan></text>
        </g>

        <!-- Hard Card -->
        <g transform="translate(0, 78)">
          <rect x="0" y="0" width="280" height="32" rx="6" fill="#0b0f19" stroke="#1e293b" stroke-width="1" />
          <rect x="0" y="0" width="4" height="32" rx="2" fill="#f43f5e" />
          <text x="15" y="20" font-size="12" font-weight="700" fill="#f43f5e" class="glow-neon-rose">Hard</text>
          <text x="265" y="20" font-size="12" font-weight="700" fill="#f1f5f9" class="mono-text" text-anchor="end">3 <tspan fill="#475569" font-size="10">/ 744</tspan></text>
        </g>
      </g>
      
    </g>

  </g>
</svg>
