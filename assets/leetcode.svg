<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 380" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=Fira+Code:wght@400;500&amp;display=swap');
      
      .status-card {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      
      .mono-text {
        font-family: 'Fira Code', monospace;
      }

      /* Glow Effects */
      .glow-neon-cyan {
        filter: drop-shadow(0 0 4px #00f2fe) drop-shadow(0 0 8px rgba(0, 242, 254, 0.3));
      }
      .glow-neon-emerald {
        filter: drop-shadow(0 0 4px #10b981) drop-shadow(0 0 8px rgba(16, 185, 129, 0.3));
      }
      .glow-neon-amber {
        filter: drop-shadow(0 0 4px #f59e0b) drop-shadow(0 0 8px rgba(245, 158, 11, 0.3));
      }
      .glow-neon-rose {
        filter: drop-shadow(0 0 4px #f43f5e) drop-shadow(0 0 8px rgba(244, 63, 94, 0.3));
      }
      .glow-gold {
        filter: drop-shadow(0 0 4px #fbbf24) drop-shadow(0 0 8px rgba(251, 191, 36, 0.3));
      }

      /* Bar Load Animations */
      @keyframes load-bar-easy {
        from { width: 0px; }
        to { width: 110px; } /* 36 solved visual bar */
      }
      @keyframes load-bar-medium {
        from { width: 0px; }
        to { width: 115px; } /* 37 solved visual bar */
      }
      @keyframes load-bar-hard {
        from { width: 0px; }
        to { width: 35px; }  /* 3 solved visual bar */
      }
      @keyframes load-dial-ring {
        from { stroke-dashoffset: 251.2; }
        to { stroke-dashoffset: 165px; } /* Representing completion ratio */
      }

      /* Scanner effect */
      @keyframes scan-animation {
        0% { transform: translateY(0); opacity: 0; }
        10% { opacity: 0.7; }
        90% { opacity: 0.7; }
        100% { transform: translateY(374px); opacity: 0; }
      }

      /* Pulsing animations */
      @keyframes pulse-light {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      @keyframes pulse-dial {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }

      /* Classes */
      .bar-easy { animation: load-bar-easy 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      .bar-medium { animation: load-bar-medium 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      .bar-hard { animation: load-bar-hard 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      .dial-ring { animation: load-dial-ring 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; stroke-dasharray: 251.2; }
      
      .scanner-line { animation: scan-animation 6s linear infinite 1s; }
      .pulse-item { animation: pulse-light 2s ease-in-out infinite; }
      .pulse-core { animation: pulse-dial 2.5s ease-in-out infinite; transform-origin: 75px 145px; }
    </style>

    <!-- Gradients -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0d16" />
      <stop offset="100%" stop-color="#111625" />
    </linearGradient>

    <linearGradient id="dial-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="bar-gradient-easy" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="bar-gradient-medium" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="bar-gradient-hard" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="gold-text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Scanner Glow Filter -->
    <filter id="scan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Body -->
  <rect width="460" height="380" rx="12" fill="url(#card-bg)" stroke="#1f2937" stroke-width="1.5" />
  
  <!-- Outer glowing border line -->
  <rect x="5" y="5" width="450" height="370" rx="9" fill="none" stroke="#2563eb" stroke-width="1.2" opacity="0.3" />

  <!-- Scanning HUD Line -->
  <line x1="6" y1="6" x2="454" y2="6" stroke="#00f2fe" stroke-width="2" class="scanner-line" filter="url(#scan-glow)" />

  <!-- Content Group -->
  <g class="status-card">
    
    <!-- Top Bar / Window Header -->
    <g transform="translate(20, 25)">
      <!-- System Title -->
      <text x="0" y="15" font-size="18" font-weight="800" fill="#f1f5f9" letter-spacing="2">QUEST: CODE TRIAL</text>
      <!-- Subtitle -->
      <text x="0" y="32" font-size="10" font-weight="600" fill="#00f2fe" class="mono-text" letter-spacing="1">THE SYSTEM: LEETCODE CRITICAL PROGRESS</text>
      
      <!-- Tech bracket corner -->
      <path d="M 400 0 L 420 0 L 420 20" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8" />
    </g>

    <!-- Divider Line -->
    <line x1="20" y1="75" x2="440" y2="75" stroke="#1f2937" stroke-width="1" />

    <!-- Left Section: Circular Total Solved Dial -->
    <g transform="translate(20, 90)">
      <!-- Cyber Box for Dial -->
      <rect width="110" height="110" rx="8" fill="#0b0f19" stroke="#1e293b" stroke-width="1.5" />
      <rect x="4" y="4" width="102" height="102" rx="6" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.2" />

      <!-- Glowing Total Solved Progress Circle -->
      <g transform="translate(55, 45)" class="pulse-core">
        <!-- Background track circle -->
        <circle cx="0" cy="0" r="32" fill="none" stroke="#1f2937" stroke-width="5" />
        <!-- Animated progress circle (Total 76 Solved) -->
        <circle cx="0" cy="0" r="32" fill="none" stroke="url(#dial-gradient)" stroke-width="5.5" stroke-linecap="round" transform="rotate(-90)" class="dial-ring glow-neon-cyan" />
        
        <!-- Text inside circle -->
        <text x="0" y="7" font-size="24" font-weight="800" fill="#f1f5f9" text-anchor="middle" class="glow-neon-cyan">76</text>
      </g>
      
      <!-- LEVEL/STATUS label below dial -->
      <text x="55" y="94" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1.5">SOLVED</text>
    </g>

    <!-- Right Section: General Stats & Info -->
    <g transform="translate(150, 90)">
      <!-- Username -->
      <text x="0" y="18" font-size="14" font-weight="500" fill="#64748b">HANDLE:</text>
      <text x="75" y="18" font-size="14" font-weight="700" fill="#f8fafc" class="mono-text">anshulsharma_</text>

      <!-- Global Rank -->
      <text x="0" y="40" font-size="14" font-weight="500" fill="#64748b">RANK:</text>
      <text x="75" y="40" font-size="14" font-weight="700" fill="#f1f5f9" class="mono-text">#1,965,340</text>

      <!-- Combat Class based on stats -->
      <text x="0" y="62" font-size="14" font-weight="500" fill="#64748b">SOLVER:</text>
      <text x="75" y="64" font-size="15" font-weight="800" fill="url(#gold-text-grad)" class="glow-gold" letter-spacing="1">A-RANK COMPETITOR</text>

      <!-- Skill Guild/Affiliation -->
      <text x="0" y="84" font-size="14" font-weight="500" fill="#64748b">FOCUS:</text>
      <text x="75" y="84" font-size="14" font-weight="600" fill="#3b82f6">Algorithms &amp; Logic</text>

      <!-- Quest Status -->
      <text x="0" y="106" font-size="14" font-weight="500" fill="#64748b">MISSION:</text>
      <text x="75" y="106" font-size="12" font-weight="700" fill="#fb923c" class="mono-text">[ SECURING CORE ]</text>
    </g>

    <!-- Divider Line -->
    <line x1="20" y1="215" x2="440" y2="215" stroke="#1f2937" stroke-width="1" />

    <!-- Bottom Section: Difficulty Breakdown & Progress Bars -->
    <g transform="translate(20, 222)">
      
      <!-- Difficulty 1: EASY -->
      <g transform="translate(0, 10)">
        <text x="0" y="12" font-size="13" font-weight="700" fill="#10b981" letter-spacing="1" class="glow-neon-emerald">EASY</text>
        <!-- Solved vs Total Available -->
        <text x="70" y="12" font-size="12" font-weight="700" fill="#94a3b8" class="mono-text">36 <tspan fill="#475569" font-size="10">/ 956</tspan></text>
        
        <!-- Bar Track -->
        <rect x="230" y="2" width="180" height="10" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.8" />
        <!-- Animated Bar -->
        <rect x="231" y="3" height="8" rx="2" fill="url(#bar-gradient-easy)" class="bar-easy glow-neon-emerald" />
      </g>

      <!-- Difficulty 2: MEDIUM -->
      <g transform="translate(0, 40)">
        <text x="0" y="12" font-size="13" font-weight="700" fill="#fbbf24" letter-spacing="1" class="glow-neon-amber">MEDIUM</text>
        <text x="70" y="12" font-size="12" font-weight="700" fill="#94a3b8" class="mono-text">37 <tspan fill="#475569" font-size="10">/ 2088</tspan></text>
        
        <!-- Bar Track -->
        <rect x="230" y="2" width="180" height="10" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.8" />
        <!-- Animated Bar -->
        <rect x="231" y="3" height="8" rx="2" fill="url(#bar-gradient-medium)" class="bar-medium glow-neon-amber" />
      </g>

      <!-- Difficulty 3: HARD -->
      <g transform="translate(0, 70)">
        <text x="0" y="12" font-size="13" font-weight="700" fill="#f43f5e" letter-spacing="1" class="glow-neon-rose">HARD</text>
        <text x="70" y="12" font-size="12" font-weight="700" fill="#94a3b8" class="mono-text">3 <tspan fill="#475569" font-size="10">/ 955</tspan></text>
        
        <!-- Bar Track -->
        <rect x="230" y="2" width="180" height="10" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.8" />
        <!-- Animated Bar -->
        <rect x="231" y="3" height="8" rx="2" fill="url(#bar-gradient-hard)" class="bar-hard glow-neon-rose" />
      </g>

      <!-- Bottom Quest Message -->
      <g transform="translate(0, 112)">
        <!-- Small tech info text -->
        <text x="0" y="12" font-size="9" font-weight="700" fill="#64748b" class="mono-text" letter-spacing="0.5">QUEST TYPE: COMBAT ALGORITHMS INGESTION SEQUENCE</text>
        
        <!-- Tech status dots -->
        <circle cx="410" cy="9" r="2" fill="#10b981" class="pulse-item" />
        <circle cx="416" cy="9" r="2" fill="#fbbf24" class="pulse-item" />
        <circle cx="422" cy="9" r="2" fill="#f43f5e" class="pulse-item" />
      </g>
      
    </g>

  </g>
</svg>
